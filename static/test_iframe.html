<!DOCTYPE html>
<html>
<head>
    <title>测试飞书 iframe（通过代理）</title>
    <style>
        body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        h2 { color: #333; margin-bottom: 15px; }
        .iframe-container { 
            width: 100%; 
            height: 700px; 
            border: 2px solid #667eea;
            border-radius: 10px;
            overflow: hidden;
            background: #f5f5f5;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .tip { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>飞书网页版嵌入测试（通过反向代理）</h2>
    <div class="iframe-container">
        <iframe src="/api/feishu-proxy" allow="camera; microphone"></iframe>
    </div>
    <p class="tip">如果能看到飞书页面，说明代理成功</p>
</body>
</html>
