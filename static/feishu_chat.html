<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 飞书消息通道</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #d8f0d8;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* 双栏并排布局 */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 卡片样式 - 仿截图 */
        .panel {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            border: 3px solid #90d090;
        }
        .panel-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .panel-title img {
            width: 24px;
            height: 24px;
        }
        
        /* 飞书二维码面板 - 仿截图样式 */
        .feishu-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .feishu-panel .qr-area {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 260px;
            margin: 10px 0;
        }
        .feishu-panel .qr-area img {
            max-width: 240px;
        }
        .feishu-panel .tip {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
        .feishu-panel .status {
            margin-top: 8px;
            font-size: 14px;
            color: #52c41a;
        }
        .feishu-panel .status.pending {
            color: #999;
        }
        
        /* 聊天窗口样式 */
        .chat-panel {
            display: flex;
            flex-direction: column;
            height: 420px;
            padding: 0;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .chat-header .info h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 500;
        }
        .chat-header .info .status {
            font-size: 12px;
            opacity: 0.8;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }
        .message {
            display: flex;
            margin-bottom: 12px;
        }
        .message.bot { justify-content: flex-start; }
        .message.user { justify-content: flex-end; }
        .message .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        .message.bot .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message.user .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .chat-input-area {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid #eee;
        }
        .quick-commands {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .quick-cmd {
            padding: 5px 10px;
            background: #f0f4ff;
            border: 1px solid #667eea;
            border-radius: 12px;
            font-size: 12px;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-cmd:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }
        .quick-cmd:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .chat-input-wrapper {
            display: flex;
            gap: 10px;
        }
        .chat-input-wrapper input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .chat-input-wrapper input:focus {
            border-color: #667eea;
        }
        .chat-input-wrapper input:disabled {
            background: #f5f5f5;
        }
        .chat-input-wrapper button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .chat-input-wrapper button:hover:not(:disabled) {
            background: #5a6fd6;
        }
        .chat-input-wrapper button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .chat-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            border-radius: 16px;
        }
        .chat-overlay .icon { font-size: 40px; }
        .chat-overlay .text { color: #666; font-size: 14px; }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid">
            <!-- 左侧：飞书扫码登录 -->
            <div class="panel feishu-panel" id="feishu-panel">
                <div class="panel-title">
                    <span>🐦</span>
                    <span>飞书扫码登录</span>
                </div>
                <div class="qr-area">
                    <div id="feishu-loading">
                        <span class="loading"></span>
                    </div>
                    <img id="feishu-qrcode-img" style="display: none;" alt="飞书二维码">
                </div>
                <div class="tip">使用<b>飞书 App</b>扫描</div>
                <div class="status pending" id="feishu-status">请扫码加入</div>
            </div>
            
            <!-- 右侧：机器人聊天窗 -->
            <div class="panel chat-panel" id="chat-panel" style="position: relative;">
                <div class="chat-header">
                    <div class="avatar">🦐</div>
                    <div class="info">
                        <h3>OpenClaw 机器人</h3>
                        <div class="status" id="bot-status">等待登录</div>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-area">
                    <div class="quick-commands">
                        <button class="quick-cmd" onclick="sendQuickCmd('执行 curl ifconfig.me')" disabled>获取IP</button>
                        <button class="quick-cmd" onclick="sendQuickCmd('执行 ls -la')" disabled>列出文件</button>
                        <button class="quick-cmd" onclick="sendQuickCmd('执行 whoami')" disabled>当前用户</button>
                    </div>
                    <div class="chat-input-wrapper">
                        <input type="text" id="chat-input" placeholder="请先扫码登录..." disabled>
                        <button id="send-btn" onclick="sendMessage()" disabled>发送</button>
                    </div>
                </div>
                
                <!-- 未登录遮罩 -->
                <div class="chat-overlay" id="chat-overlay">
                    <div class="icon">🔐</div>
                    <div class="text">请先扫码登录飞书</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let pollTimer = null;
        let isLoggedIn = false;
        let botChatOpened = false;

        async function init() {
            try {
                const resp = await fetch('/api/feishu-messenger/init', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await resp.json();
                
                if (data.success) {
                    sessionId = data.session_id;
                    document.getElementById('feishu-loading').style.display = 'none';
                    const img = document.getElementById('feishu-qrcode-img');
                    img.src = 'data:image/png;base64,' + data.qr_image;
                    img.style.display = 'block';
                    startPolling();
                } else {
                    document.getElementById('feishu-loading').innerHTML = 
                        '<span style="color: red;">获取失败</span>';
                }
            } catch (e) {
                document.getElementById('feishu-loading').innerHTML = 
                    '<span style="color: red;">网络错误</span>';
            }
        }

        function startPolling() {
            pollTimer = setInterval(async () => {
                try {
                    const resp = await fetch('/api/feishu-messenger/poll', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({session_id: sessionId})
                    });
                    const data = await resp.json();
                    
                    if (data.success) {
                        if (!isLoggedIn) {
                            document.getElementById('feishu-qrcode-img').src = 
                                'data:image/png;base64,' + data.screenshot;
                        }
                        if (data.logged_in && !isLoggedIn) {
                            onLoginSuccess();
                        }
                    }
                } catch (e) {
                    console.error('Poll error:', e);
                }
            }, 1000);
        }

        async function onLoginSuccess() {
            isLoggedIn = true;
            
            // 更新左侧状态
            document.getElementById('feishu-status').textContent = '✅ 扫码成功';
            document.getElementById('feishu-status').classList.remove('pending');
            
            // 激活聊天
            document.getElementById('chat-overlay').classList.add('hidden');
            document.getElementById('bot-status').textContent = '在线';
            document.getElementById('chat-input').disabled = false;
            document.getElementById('chat-input').placeholder = '输入命令发送给 OpenClaw...';
            document.getElementById('send-btn').disabled = false;
            document.querySelectorAll('.quick-cmd').forEach(btn => btn.disabled = false);
            
            addMessage('bot', '你好！我是 OpenClaw 机器人，已成功连接。\n可以发送命令让我执行，例如：\n• 执行 curl ifconfig.me\n• 执行 ls -la');
            
            openBotChatSilently();
        }

        async function openBotChatSilently() {
            try {
                await fetch('/api/feishu-messenger/open-bot', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        bot_name: 'openclaw',
                        preset_msg: ''
                    })
                });
                botChatOpened = true;
            } catch (e) {
                console.error('Open bot error:', e);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage('user', text);
            input.value = '';
            
            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.textContent = '...';
            
            try {
                if (!botChatOpened) await openBotChatSilently();
                
                await fetch('/api/feishu-messenger/type', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: sessionId, text: text})
                });
                
                const resp = await fetch('/api/feishu-messenger/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: sessionId})
                });
                const data = await resp.json();
                
                if (data.success) {
                    addMessage('bot', '命令已发送，请在飞书中查看回复。');
                } else {
                    addMessage('bot', '发送失败: ' + (data.error || '请重试'));
                }
            } catch (e) {
                addMessage('bot', '发送失败: ' + e.message);
            }
            
            btn.disabled = false;
            btn.textContent = '发送';
        }

        function sendQuickCmd(cmd) {
            document.getElementById('chat-input').value = cmd;
            sendMessage();
        }

        function addMessage(type, text) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.innerHTML = '<div class="bubble">' + text.replace(/\n/g, '<br>') + '</div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('chat-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.target.disabled) sendMessage();
            });
            init();
        });

        window.addEventListener('beforeunload', () => {
            if (sessionId) {
                navigator.sendBeacon('/api/feishu-messenger/cleanup', 
                    JSON.stringify({session_id: sessionId}));
            }
        });
    </script>
</body>
</html>
